      #scanlines { position:fixed; inset:0; z-index:99; pointer-events:none; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 4px); }

      #vhs-label .rec-dot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:recdot 1.2s ease-in-out infinite; }
      @keyframes recdot { 0%,100%{opacity:1} 50%{opacity:0.2} }
      #tc { font-variant-numeric:tabular-nums; }
      #video-wrap { position:relative; width:min(820px,96vw); aspect-ratio:16/9; background:#000; overflow:hidden; border:1px solid #1c1c1c; box-shadow:0 0 60px rgba(0,255,65,0.04),0 0 0 1px #111; }
      #video-wrap video { width:100%; height:100%; object-fit:cover; display:block; filter:contrast(1.08) saturate(0.72) brightness(0.9) sepia(0.12); }
      #video-wrap::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px); pointer-events:none; }
      #tracking { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:10; }
      .tline { position:absolute; left:0; width:100%; height:3px; background:linear-gradient(to right,transparent,rgba(255,255,255,0.08),transparent); opacity:0; animation:tscroll 12s linear infinite; }
      .tline:nth-child(2){animation-delay:-4s} .tline:nth-child(3){animation-delay:-8s}
      @keyframes tscroll { 0%{top:-4px;opacity:0} 5%{opacity:1} 95%{opacity:1} 100%{top:100%;opacity:0} }
      #nametag { position:absolute; bottom:14px; left:14px; font-family:'Share Tech Mono',monospace; font-size:clamp(11px,1.6vw,14px); color:var(--white); letter-spacing:0.12em; text-shadow:0 0 8px rgba(255,255,255,0.3); opacity:0.7; }
      #datestamp { position:absolute; bottom:14px; right:14px; font-family:'Share Tech Mono',monospace; font-size:clamp(10px,1.4vw,12px); color:var(--green); letter-spacing:0.1em; opacity:0.6; }
      #bottom-bar { width:min(820px,96vw); display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding:0 4px; font-size:10px; letter-spacing:0.15em; color:#333; }
      #notfound { position:fixed; inset:0; z-index:200; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
      #notfound h1 { font-family:'Special Elite',cursive; font-size:clamp(28px,6vw,60px); color:var(--red); letter-spacing:0.1em; text-align:center; animation:glitch-text 3s infinite; }
      #notfound p { font-family:'Share Tech Mono',monospace; font-size:13px; color:#444; letter-spacing:0.2em; text-align:center; }
      @keyframes glitch-text { 0%,90%,100%{text-shadow:none;transform:none} 92%{text-shadow:-3px 0 var(--green);transform:skewX(-1deg)} 94%{text-shadow:3px 0 var(--red);transform:skewX(1deg)} 96%{text-shadow:none;transform:none} }
      #cursor { position:fixed; z-index:9999; width:12px; height:12px; border:1px solid rgba(0,255,65,0.5); border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); }
      #play-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); cursor:pointer; z-index:20; transition:opacity 0.3s; }
      #play-overlay:hover { background:rgba(0,0,0,0.3); }
      #play-btn { width:64px; height:64px; border:2px solid rgba(232,224,208,0.6); border-radius:50%; display:flex; align-items:center; justify-content:center; }
      #play-btn::after { content:''; border-style:solid; border-width:10px 0 10px 20px; border-color:transparent transparent transparent rgba(232,224,208,0.8); margin-left:4px; }
    </style>

  <div id="stage">

        <video id="mainvideo" preload="auto" playsinline></video>video>
        <div id="tracking"><div class="tline"></div>div><div class="tline"></div>div><div class="tline"></div>div></div>div>
        <div id="nametag"></div>div>

  <script>
    const GROOMSMEN = {
        sam:    { name: 'SAM NEWMAN',          videoUrl: '' },
        zach:   { name: 'ZACHARY HAWTHORNE',   videoUrl: '' },
        josey:  { name: 'JOSEY GREEN',         videoUrl: '' },
        andrew: { name: 'ANDREW THOMASON',     videoUrl: '' },
        jasper: { name: 'JASPER HAWTHORNE',    videoUrl: '' },
    };
    const param = new URLSearchParams(window.location.search).get('name');
    const person = param ? GROOMSMEN[param.toLowerCase()] : null;
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
    let tcFrames=0;
    setInterval(()=>{ tcFrames++; const f=tcFrames%30,s=Math.floor(tcFrames/30)%60,m=Math.floor(tcFrames/1800)%60,h=Math.floor(tcFrames/108000); document.getElementById('tc').textContent=[h,m,s].map(n=>String(n).padStart(2,'0')).join(':')+':'+String(f).padStart(2,'0'); },33);
    const bootLines=['VHS-C PLAYBACK UNIT v2.4','--------------------------------','INITIALIZING TAPE DRIVE...','HEAD ALIGNMENT: OK','TRACKING: AUTO','LOADING EVIDENCE ARCHIVE...','',person?'RECIPIENT IDENTIFIED: '+person.name:'ERROR: RECIPIENT UNKNOWN','',person?'DECRYPTING PERSONAL MESSAGE...':'ABORT - NO TAPE FOUND'];
    const bootEl=document.getElementById('boot-text');
    let lineIdx=0,charIdx=0;
    function typeBoot(){if(lineIdx>=bootLines.length){setTimeout(endBoot,600);return;}const line=bootLines[lineIdx];if(charIdx<=line.length){bootEl.textContent=bootLines.slice(0,lineIdx).join('\n')+(lineIdx>0?'\n':'')+line.slice(0,charIdx);charIdx++;setTimeout(typeBoot,charIdx===1?60:22);}else{lineIdx++;charIdx=0;setTimeout(typeBoot,lineIdx===bootLines.length-1?400:80);}}
    function endBoot(){const boot=document.getElementById('boot');boot.style.transition='opacity 0.5s';boot.style.opacity='0';setTimeout(()=>{boot.style.display='none';if(!person){document.getElementById('notfound').style.display='flex';}else{showStage();}},500);}
    function showStage(){const stage=document.getElementById('stage');stage.style.display='flex';document.getElementById('nametag').textContent='// '+person.name;document.getElementById('tape-id').textContent='TAPE-'+param.toUpperCase()+'-'+(Math.floor(Math.random()*9000+1000));const vid=document.getElementById('mainvideo');if(person.videoUrl){vid.src=person.videoUrl;}else{document.getElementById('play-overlay').style.display='none';}}
    function startVideo(){const vid=document.getElementById('mainvideo'),overlay=document.getElementById('play-overlay');overlay.style.opacity='0';overlay.style.pointerEvents='none';vid.play();vid.onended=()=>{overlay.style.opacity='1';overlay.style.pointerEvents='auto';};}
    setTimeout(typeBoot,400);
  </script>
